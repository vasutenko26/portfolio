<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chat with your documents — RAG assistant</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>Chat with your documents</h1>
      <p class="sub">Self-hosted RAG · ответы со ссылками на источник · данные не покидают сервер</p>
      <div class="provider" id="provider"></div>
    </header>

    <section class="panel upload">
      <label class="filebtn">
        <input type="file" id="file" accept=".pdf,.md,.markdown,.txt" multiple hidden />
        + Загрузить документы (PDF / MD / TXT)
      </label>
      <div class="files" id="files"></div>
    </section>

    <section class="chat" id="chat"></section>

    <form class="ask" id="ask">
      <input type="text" id="q" placeholder="Спросите что-нибудь по загруженным документам…" autocomplete="off" />
      <button type="submit" id="send">Спросить</button>
    </form>
  </div>
  <script src="/app.js"></script>
</body>
</html>
