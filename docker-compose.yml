name: portfolio

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]

  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WP_LOGIN_SLUG: ${WP_LOGIN_SLUG}
      WORDPRESS_CONFIG_EXTRA: |
        /* Сайт всегда по https, прокси Caddy отдаёт X-Forwarded-Proto */
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
        if (isset($$_SERVER['HTTP_X_FORWARDED_HOST'])) {
            $$_SERVER['HTTP_HOST'] = $$_SERVER['HTTP_X_FORWARDED_HOST'];
        }
        define('WP_HOME', 'https://${SITE_DOMAIN}');
        define('WP_SITEURL', 'https://${SITE_DOMAIN}');
        define('FS_METHOD', 'direct');
        define('DISALLOW_FILE_EDIT', true);
        define('WP_AUTO_UPDATE_CORE', 'minor');
    volumes:
      - wp_data:/var/www/html
      - ./src/theme/davidv:/var/www/html/wp-content/themes/davidv
      - ./src/mu-plugins:/var/www/html/wp-content/mu-plugins
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [wordpress]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/n8n.caddy:/etc/caddy/n8n.caddy:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
    networks: [internal]

  # Запускается по требованию: docker compose run --rm wpcli wp ...
  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    user: "33:33"
    volumes:
      - wp_data:/var/www/html
      - ./src/theme/davidv:/var/www/html/wp-content/themes/davidv
      - ./src/mu-plugins:/var/www/html/wp-content/mu-plugins
    networks: [internal]
    entrypoint: ["wp", "--allow-root"]
    profiles: ["cli"]

  # ---------- n8n (автоматизация) ----------
  n8n-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD}
      POSTGRES_DB: n8n
    volumes:
      - n8n_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    networks: [internal]

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      n8n-postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n.davidvasutenko.fun
      N8N_PROTOCOL: https
      N8N_PORT: "5678"
      WEBHOOK_URL: https://n8n.davidvasutenko.fun/
      N8N_EDITOR_BASE_URL: https://n8n.davidvasutenko.fun/
      N8N_SECURE_COOKIE: "true"
      N8N_PROXY_HOPS: "1"
      GENERIC_TIMEZONE: Europe/Kyiv
      TZ: Europe/Kyiv
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_RUNNERS_ENABLED: "false"
      N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
      NODE_FUNCTION_ALLOW_BUILTIN: "fs"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      GEMINI_MODEL: gemini-2.5-flash
      # секреты для воркфлоу (через $$env, в экспортируемый JSON не попадают)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SERVER_BOT_TOKEN: ${SERVER_BOT_TOKEN}
      SERVER_CHAT_ID: ${SERVER_CHAT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SITE_HEALTH_URL: ${SITE_HEALTH_URL}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/files:/files
    mem_limit: 1024m
    networks: [internal]

  # ---------- личный бот-ассистент задач ----------
  assistant-bot:
    build: ./assistant
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ASSISTANT_TZ: Europe/Kyiv
      ASSISTANT_DB: /data/assistant.db
      FRIEND_CHAT_ID: ${FRIEND_CHAT_ID:-1178778072}
    volumes:
      - assistant_data:/data
    mem_limit: 256m
    networks: [internal]

  # ---------- автобэкапы (3×/день → бот «Фриланс сервер») ----------
  backup:
    build: ./backup
    restart: unless-stopped
    environment:
      TZ: Europe/Kyiv
      COMPOSE_PROJECT: portfolio
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/portfolio:/opt/portfolio
    mem_limit: 256m
    networks: [internal]

  # ---------- бот «Фриланс сервер»: отчёты по требованию (кнопки) ----------
  # privileged + pid:host → nsenter в namespace хоста для серверного отчёта от root
  server-bot:
    build: ./serverbot
    restart: unless-stopped
    privileged: true
    pid: "host"
    environment:
      SERVER_BOT_TOKEN: ${SERVER_BOT_TOKEN}
      SERVER_CHAT_ID: ${SERVER_CHAT_ID}
      SITE_HEALTH_URL: ${SITE_HEALTH_URL:-https://davidvasutenko.fun/}
      SITE_NAME: ${SITE_NAME:-davidvasutenko.fun}
      LEADS_CSV: /files/leads.csv
      REPORT_SH: /opt/portfolio/serverbot/server-report-print.sh
    volumes:
      - ./n8n/files:/files:ro
    mem_limit: 128m
    networks: [internal]

  # ---------- мониторинг ----------
  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    mem_limit: 128m
    networks: [internal]

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    mem_limit: 384m
    networks: [internal]

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on: [prometheus]
    environment:
      GF_SERVER_ROOT_URL: https://grafana.davidvasutenko.fun
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_VIEWERS_CAN_EDIT: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 256m
    networks: [internal]

volumes:
  db_data:
  wp_data:
  n8n_db:
  n8n_data:
  prometheus_data:
  grafana_data:
  assistant_data:

networks:
  internal:
