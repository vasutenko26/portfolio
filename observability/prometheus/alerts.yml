groups:
  - name: host
    rules:
      - alert: HostHighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU > 90% for 5m (current {{ $value | printf \"%.0f\" }}%)."

      - alert: HostHighMemory
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 90
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "RAM > 90% for 5m (current {{ $value | printf \"%.0f\" }}%)."

      - alert: HostLowDisk
        expr: |
          (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
               / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"}) * 100 > 90
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Low disk on {{ $labels.instance }} ({{ $labels.mountpoint }})"
          description: "Disk > 90% full for 5m (current {{ $value | printf \"%.0f\" }}%)."

  - name: containers
    rules:
      # Контейнер существует, но не в статусе running (остановлен/убит/упал).
      - alert: ContainerDown
        expr: docker_container_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Container down: {{ $labels.name }}"
          description: "Container {{ $labels.name }} is not running for over a minute."

  - name: endpoints
    rules:
      - alert: EndpointDown
        expr: probe_success == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Endpoint down: {{ $labels.instance }}"
          description: "Blackbox probe failing for 2m."

      - alert: TLSCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 14
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "TLS cert expiring: {{ $labels.instance }}"
          description: "Certificate expires in {{ $value | printf \"%.0f\" }} days."

  - name: targets
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Scrape target down: {{ $labels.job }} / {{ $labels.instance }}"
          description: "Prometheus cannot scrape this target for 2m."
