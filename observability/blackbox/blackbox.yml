modules:
  # Обычный HTTP-чек: 2xx + проверка TLS (срок сертификата экспортируется отдельной метрикой).
  http_2xx:
    prober: http
    timeout: 8s
    http:
      method: GET
      fail_if_not_ssl: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  # Для сервисов под Basic Auth (n8n): 401 = «живой».
  http_2xx_401:
    prober: http
    timeout: 8s
    http:
      method: GET
      valid_status_codes: [200, 204, 301, 302, 401]
      fail_if_not_ssl: false
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false
