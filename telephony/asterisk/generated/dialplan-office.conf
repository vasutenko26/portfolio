; ---- ext-queues: entry point for queue 2001 (Support) ----
exten => 2001,1,Gosub(macro-user-callerid,s,1())
exten => 2001,n,Answer
exten => 2001,n,Set(__FROMQUEUEEXTEN=${CALLERID(number)})
exten => 2001,n,Gosub(macro-blkvm-set,s,1(reset))
exten => 2001,n,ExecIf($["${REGEX("(U[(]macro-auto-blkvm[)])" ${DIAL_OPTIONS})}" != "1"]?Set(_DIAL_OPTIONS=${DIAL_OPTIONS}U(macro-auto-blkvm)))
exten => 2001,n,Set(__NODEST=${EXTEN})
exten => 2001,n,Set(__QCONTEXT=0)
exten => 2001,n,Set(QCIDPP=${IF($[${LEN(${VQ_CIDPP})}>0]?"${VQ_CIDPP}": )})
exten => 2001,n,Set(VQ_CIDPP=)
exten => 2001,n,ExecIf($["${QCIDPP}"!=""]?Gosub(macro-prepend-cid,s,1(${QCIDPP})))
exten => 2001,n,Set(QAINFO=${IF($[${LEN(${VQ_AINFO})}>0]?${VQ_AINFO}: )})
exten => 2001,n,Set(VQ_AINFO=)
exten => 2001,n,Set(__RVOL_MODE=)
exten => 2001,n,ExecIf($["${QAINFO}"!=""]?Set(__ALERT_INFO=${QAINFO}))
exten => 2001,n,Set(QJOINMSG=${IF($[${LEN(${VQ_JOINMSG})}>0]?${IF($["${VQ_JOINMSG}"!="0"]?${VQ_JOINMSG}: )}: )})
exten => 2001,n,Set(VQ_JOINMSG=)
exten => 2001,n,Set(QCANCELMISSED=)
exten => 2001,n,Set(QRETRY=${IF($[${LEN(${VQ_RETRY})}>0]?${VQ_RETRY}: )})
exten => 2001,n,Set(VQ_RETRY=)
exten => 2001,n(qoptions),Set(QOPTIONS=${IF($[${LEN(${VQ_OPTIONS})}>0]?${VQ_OPTIONS}:t)}${QCANCELMISSED}${QRINGOPTS}${QRETRY})
exten => 2001,n,Set(VQ_OPTIONS=)
exten => 2001,n(qgosub),Set(QGOSUB=${IF($[${LEN(${VQ_GOSUB})}>0]?${VQ_GOSUB}:${QGOSUB})})
exten => 2001,n,Set(VQ_GOSUB=)
exten => 2001,n(qagi),Set(QAGI=${IF($[${LEN(${VQ_AGI})}>0]?${VQ_AGI}:${QAGI})})
exten => 2001,n,Set(VQ_AGI=)
exten => 2001,n(qrule),Set(QRULE=${IF($[${LEN(${VQ_RULE})}>0]?${IF($["${VQ_RULE}"!="0"]?${VQ_RULE}: )}:${QRULE})})
exten => 2001,n,Set(VQ_RULE=)
exten => 2001,n(qposition),Set(QPOSITION=${IF($[${LEN(${VQ_POSITION})}>0]?${VQ_POSITION}:${QPOSITION})})
exten => 2001,n,Set(VQ_POSITION=)
exten => 2001,n,Set(MONITOR_OPTIONS=b)
exten => 2001,n,Gosub(sub-record-check,s,1(q,2001,always))
exten => 2001,n,Set(__SIGNORE=TRUE)
exten => 2001,n,Set(__QC_CONFIRM=0)
exten => 2001,n,GotoIf($[$["${QC_CONFIRM}"="1"] | $[${LEN(${VQ_CONFIRMMSG})}>1]]?QVQANNOUNCE:NOQVQANNOUNCE)
exten => 2001,n(QVQANNOUNCE),Set(__FORCE_CONFIRM=${CHANNEL})
exten => 2001,n,Set(SHARED(ANSWER_STATUS)=NOANSWER)
exten => 2001,n,Set(__CALLCONFIRMCID=${CALLERID(number)})
exten => 2001,n,Set(__ALT_CONFIRM_MSG=${IF($[${LEN(${VQ_CONFIRMMSG})}>0]?${IF($["${VQ_CONFIRMMSG}"!="0"]?${VQ_CONFIRMMSG}:default )}:default)})
exten => 2001,n(NOQVQANNOUNCE),Set(VQ_CONFIRMMSG=)
exten => 2001,n,ExecIf($["${QJOINMSG}"!=""]?Playback(${QJOINMSG}, ))
exten => 2001,n,QueueLog(2001,${UNIQUEID},NONE,DID,${FROM_DID})
exten => 2001,n,Set(QAANNOUNCE=${IF($[${LEN(${VQ_AANNOUNCE})}>0]?${IF($["${VQ_AANNOUNCE}"!="0"]?${VQ_AANNOUNCE}: )}: )})
exten => 2001,n,Set(VQ_AANNOUNCE=)
exten => 2001,n,Set(QMOH=${IF($["${VQ_MOH}"!=""]?${VQ_MOH}:default)})
exten => 2001,n,Set(VQ_MOH=)
exten => 2001,n,ExecIf($["${QMOH}"!=""]?Set(__MOHCLASS=${QMOH}))
exten => 2001,n,ExecIf($["${MOHCLASS}"!=""]?Set(CHANNEL(musicclass)=${MOHCLASS}))
exten => 2001,n,Set(QMAXWAIT=${IF($[${LEN(${VQ_MAXWAIT})}>0]?${VQ_MAXWAIT}:300)})
exten => 2001,n,Set(VQ_MAXWAIT=)
exten => 2001,n,Set(QUEUENUM=2001)
exten => 2001,n,Set(QUEUEJOINTIME=${EPOCH})
exten => 2001,n(qcall),Queue(2001,${QOPTIONS},,${QAANNOUNCE},${QMAXWAIT},${QAGI},${QGOSUB},${QRULE},${QPOSITION},)
exten => 2001,n,Gosub(macro-blkvm-clr,s,1())
exten => 2001,n,Gosub(sub-record-cancel,s,1())
exten => 2001,n,Set(__NODEST=)
exten => 2001,n,Set(_QUEUE_PRIO=0)
exten => 2001,n,Set(MONITOR_OPTIONS=)
exten => 2001,n,Set(QDEST=${VQ_DEST})
exten => 2001,n,Set(VQ_DEST=)
exten => 2001,n(gotodest),GotoIf($["${QDEST}"=""]?app-blackhole,hangup,1:${CUT(QDEST,^,1)},${CUT(QDEST,^,2)},${CUT(QDEST,^,3)})
exten => 2001,1,Goto(from-internal,${QAGENT},1)

[timeconditions]
include => timeconditions-custom
exten => 2,1,Set(DB(TC/2/INUSESTATE)=INUSE)
exten => 2,n,Set(DB(TC/2/NOT_INUSESTATE)=NOT_INUSE)
exten => 2,n,Noop(TIMENOW: ${STRFTIME(${EPOCH},,%H:%M,%a,%e,%b)})
exten => 2,n,Noop(TIMEMATCHED: ${IFTIME(09:00-18:00,mon-fri,*,*?TRUE:FALSE)})
exten => 2,n,GotoIfTime(09:00-18:00,mon-fri,*,*?truestate)
exten => 2,n(falsestate),GotoIf($["${DB(TC/2):0:4}" = "true"]?truegoto)
exten => 2,n,ExecIf($["${DB(TC/2)}" = "false"]?Set(DB(TC/2)=))
exten => 2,n(falsegoto),Set(DEVICE_STATE(Custom:TC2)=INUSE)
exten => 2,n,ExecIf($["${DB(TC/2)}" = "false_sticky"]?Set(DEVICE_STATE(Custom:TCSTICKY${ARG1})=INUSE))
exten => 2,n,GotoIf($["${TCRETURN}"!="RETURN"]?app-blackhole,hangup,1)
exten => 2,n,Set(TCSTATE=false)
exten => 2,n,Set(TCOVERRIDE=${IF($["${DB(TC/2):0:5}" = "false"]?true:false)})
exten => 2,n,Return()
exten => 2,n(truestate),GotoIf($["${DB(TC/2):0:5}" = "false"]?falsegoto)
exten => 2,n,ExecIf($["${DB(TC/2)}" = "true"]?Set(DB(TC/2)=))
exten => 2,n(truegoto),Set(DEVICE_STATE(Custom:TC2)=NOT_INUSE)
exten => 2,n,ExecIf($["${DB(TC/2)}" = "true_sticky"]?Set(DEVICE_STATE(Custom:TCSTICKY${ARG1})=INUSE))
exten => 2,n,GotoIf($["${TCRETURN}"!="RETURN"]?ivr-2,s,1)
exten => 2,n,Set(TCSTATE=true)
exten => 2,n,Set(TCOVERRIDE=${IF($["${DB(TC/2):0:4}" = "true"]?true:false)})
exten => 2,n,Return()

;--== end of [timeconditions] ==--;


[ivr-2] ; Main Menu
include => ivr-2-custom
include => from-ivr-directory-all
exten => s,1,Set(TIMEOUT_LOOPCOUNT=0)
exten => s,n,Set(INVALID_LOOPCOUNT=0)
exten => s,n,Set(_IVR_CONTEXT_${CONTEXT}=${IVR_CONTEXT})
exten => s,n,Set(_IVR_CONTEXT=${CONTEXT})
exten => s,n,Set(__IVR_RETVM=RETURN)
exten => s,n,Set(__IVR_ACCEPT_POUND=0)
exten => s,n,GotoIf($["${CHANNEL(state)}" = "Up"]?skip)
exten => s,n,Answer
exten => s,n(skip),Set(IVR_MSG=custom/office-greeting)
exten => s,n(start),Set(TIMEOUT(digit)=3)
exten => s,n,ExecIf($["${IVR_MSG}" != ""]?Background(${IVR_MSG}))
exten => s,n,WaitExten(10,)

exten => 1,1,Set(__ivrreturn=0)
exten => 1,n(ivrsel-1),Goto(from-did-direct,102,1)

exten => 2,1,Set(__ivrreturn=0)
exten => 2,n(ivrsel-2),Goto(ext-queues,2001,1)

exten => i,1,Set(INVALID_LOOPCOUNT=$[${INVALID_LOOPCOUNT}+1])
exten => i,n,GotoIf($[${INVALID_LOOPCOUNT} > 3]?final)
exten => i,n,Set(IVR_MSG=no-valid-responce-pls-try-again&custom/office-greeting)
exten => i,n,Goto(s,start)
exten => i,n(final),Playback(no-valid-responce-transfering)
exten => i,n,Goto(from-did-direct,101,1)

exten => t,1,Set(TIMEOUT_LOOPCOUNT=$[${TIMEOUT_LOOPCOUNT}+1])
exten => t,n,GotoIf($[${TIMEOUT_LOOPCOUNT} > 3]?final)
exten => t,n,Set(IVR_MSG=no-valid-responce-pls-try-again&custom/office-greeting)
exten => t,n,Goto(s,start)
exten => t,n(final),Playback(no-valid-responce-transfering)
exten => t,n,Goto(from-did-direct,101,1)

exten => return,1,Set(_IVR_CONTEXT=${CONTEXT})
exten => return,n,Set(_IVR_CONTEXT_${CONTEXT}=${IVR_CONTEXT_${CONTEXT}})
exten => return,n,Set(IVR_MSG=custom/office-greeting)
exten => return,n,Goto(s,start)

exten => h,1,Hangup()

exten => hang,1,Playback(vm-goodbye)
exten => hang,n,Hangup()

;--== end of [ivr-2] ==--;


