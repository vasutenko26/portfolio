; ============================================================================
;  Custom dialplan — Telephony / VoIP demo (David Vasutenko portfolio case)
;  Loaded by FreePBX via #include of extensions_custom.conf.
;
;  Purpose: a self-contained "support agent" that auto-answers, so a locally
;  originated test call can traverse IVR -> Support queue -> answered agent and
;  produce a REAL recorded conversation + CDR without any registered softphone.
;  In a production install the queue members are real PJSIP extensions; this
;  context only exists to make the demo call self-proving on a closed stand.
; ============================================================================

[demo-agent]
exten => s,1,NoOp(Demo support agent — auto-answer for proof call)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(custom/demo-agent-hello)
 same => n,Playback(demo-congrats)
 same => n,Wait(2)
 same => n,Playback(vm-goodbye)
 same => n,Hangup()

; A simulated external caller for the local proof-call. Sets a fake external
; CallerID, then enters the "Main Menu" IVR's option 2 (Support) — exactly as a
; real caller pressing 2 would — which routes into the Support queue (2001).
; ivr-2 = the FreePBX-generated context for the "Main Menu" IVR (id 2).
[demo-inbound]
exten => s,1,NoOp(Demo external caller -> Office IVR -> option 2 Support)
 same => n,Set(CALLERID(num)=0445550123)
 same => n,Set(CALLERID(name)=Demo Caller)
 same => n,Goto(ivr-2,2,1)
