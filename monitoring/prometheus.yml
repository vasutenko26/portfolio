global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node            # метрики хоста (CPU, RAM, диск, сеть)
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: app             # здоровье/латентность тестового приложения
    metrics_path: /metrics
    static_configs:
      - targets: ['app:3000']
